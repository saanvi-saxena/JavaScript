<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals Before 2026 Ends</title>
    <link rel="stylesheet" href="goalsstyle.css">
</head>
<body>

    <div class="container">
        <h1>🎯Goals Before 2026 Ends🎯</h1>
        <p class="subtitle">
            Every completed goal brings me one step closer to becoming the developer I want to be.
        </p>

        <div class="input-section">
            <input 
            type="text"
            id="goalInput"
            placeholder="Enter a new goal..."
            >
            <button id="addGoalBtn">
                Add Goal
            </button>
        </div>

        <div class="progress-section">

            <p>
                Progress:
                <span id="progressText">
                    0/0 Completed
                </span>
            </p>

            <div class="progressBar">
             <div class="progressLevel"></div>
            </div>

        </div>

    <ul id="goalList">

    </ul>
    
    <script src="goalsscript.js"></script>
</body>
</html>
